# Voice Profile v1 — initial template.
#
# STORAGE ZONE: personal-Drive-synced (via links.yaml). NEVER committed to
# any repo. Safe to sync across your own machines.
#
# CONTAINS: paraphrased descriptors (LLM-rewritten with anti-leak rules)
# + synthetic exemplars (placeholder content like "X", "Y", "Alice", "the
# team", "tool A") + aggregate stylometric stats per audience × doc_type.
#
# DOES NOT CONTAIN: source text, document titles, file paths, URLs,
# third-party names, emails, handles, or verbatim quotes >5 words from any
# source. Every entry passes through scrub validation before write.
#
# Materialized to ~/.config/ai-seal-tools/voice/profile.yaml on first install.
# Audiences populate as docs are analyzed by /voice-analyze and accepted by
# /voice-review.
schema_version: 1
generated_at: "1970-01-01T00:00:00Z"
last_updated: "1970-01-01T00:00:00Z"

audience_registry:
  technical_peer: "Design docs, RFCs, technical Slack to engineering peers"
  leadership: "Status updates, project pitches, escalations to managers/execs"
  direct_report: "1:1 prep, feedback, coaching messages to direct reports"
  cross_functional: "Specs, explainers for PM/design/non-engineering partners"
  external_public: "Blog posts, talk abstracts, public READMEs"
  casual: "DMs to friends, casual Slack, social"
  self_notes: "Journals, todos, scratch — unfiltered private voice"

audiences: {}

shared_anti_patterns:
  - id: ap_bold_term_bullets
    rule: "Never use **bold term**: explanation bullets — the single most identifiable AI tell"
    derived: false
  - id: ap_filler_phrases
    rule: "Avoid: 'It's worth noting', 'In today's landscape', 'delve into', 'dive into', 'pivotal', 'seamless', 'robust', 'utilize'"
    derived: false
  - id: ap_performative_enthusiasm
    rule: "Avoid: 'Great question', 'I'm excited to', 'incredible', 'powerful'"
    derived: false
  - id: ap_signposting
    rule: "Avoid signposting transitions: 'Let's explore', 'Now let's turn to', 'Moving on to'"
    derived: false
  - id: ap_balanced_bothsidesism
    rule: "Avoid 'On the one hand X, on the other Y, ultimately Z' closing structures"
    derived: false
  - id: ap_em_dash_overuse
    rule: "Em-dash rate must stay near the calibrated baseline (filled in once polished audience data exists)"
    derived: true
    derived_from_metric: "punctuation_per_100w.em_dash"

merge_history: []
