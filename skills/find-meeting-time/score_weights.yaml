# Default scoring weights for find-meeting-time slot ranking.
# Each entry controls a single penalty applied in freebusy.py's score_slot.
# Higher penalty = a slot scores lower when that condition fires.
#
# The base score is 100; final score is floored at 0. Don't bother changing
# either of those — they're structural, not preferential.
#
# To override these values for your local setup, create a sibling file
# `score_weights.local.yaml` and specify only the keys you want to change.
# That file is gitignored so per-user / per-session tweaks don't leak into
# commits.

# Penalty applied per conflicting attendee:
#   per_conflict = (10 - conflict.movability) * conflict_movability_multiplier
# Movability 10 (focus block) → 0 penalty; movability 0 (OOO) → 50 penalty
# at the default multiplier of 5.
conflict_movability_multiplier: 5

# Penalty when the slot overlaps lunch (12:00-13:00 local).
lunch_overlap: 10

# Penalty when the slot starts within the first 30 min of the working day.
day_edge_early: 5

# Penalty when the slot ends within the last 30 min of the working day.
day_edge_late: 5

# Penalty applied per attendee whose local time is outside their working
# hours (only fires for attendees with a configured timezone in
# config.yaml's `attendee_timezones` map).
attendee_tz_outside_hours: 20

# When a recurring conflict appears `threshold` or more times in the queried
# window (i.e. weekly cadence in a 3-week window, daily in a 1-week window),
# skipping ONE instance is low-cost — add `bonus` back to the slot's score
# per qualifying conflict. Set bonus to 0 to disable.
recurring_skippable_threshold: 3
recurring_skippable_bonus: 5

# Learned movability adjustment from outcomes.jsonl. For each
# (event-fingerprint, attendee) tuple in the outcomes log, recorded
# past outcomes shift the per-conflict score:
#   - each "moved" or "agreed" outcome adds learned_moved_bonus_per
#   - each "declined" outcome subtracts learned_declined_penalty_per
# Net delta is clamped to ±learned_max_adjustment so a single attendee's
# history can't dominate the structural ranking. Set learned_max_adjustment
# to 0 to disable the learned signal entirely (history is still logged).
learned_moved_bonus_per: 2
learned_declined_penalty_per: 3
learned_max_adjustment: 8

# Seniority penalty — applied per conflict when the conflicting event
# has at least one attendee whose tier (in seniority.yaml) exceeds the
# threshold. Tiers: 0=IC, 1=senior IC / first-line manager, 2=Principal
# IC / Sr Manager, 3=Director, 4=VP, 5=SVP/EVP/C-level.
#   penalty = (max_tier - threshold) * per_tier_above, clamped at max_penalty
# Defaults: any conflict whose senior attendee is a Director (3) or above
# gets a penalty starting at -5 and rising to -20 for SVP/C-level.
seniority_threshold: 2
seniority_penalty_per_tier_above: 5
seniority_max_penalty: 20
