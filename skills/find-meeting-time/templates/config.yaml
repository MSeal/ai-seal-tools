# find-meeting-time — engine-level config (working hours only).
# This file holds constants the helper script must apply BEFORE invoking
# Claude (slot search space). Subjective scheduling preferences live in
# preferences.md alongside this file.

working_hours:
  default: "09:00-17:00"
  # Per-day overrides — uncomment to use:
  # monday:    "10:00-17:00"     # late start Monday
  # friday:    "09:00-15:00"     # early end Friday
